<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ChiriProject - アプリ紹介">
  <title>ChiriProject　Apps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --text: #2D2B2C;
      --text-secondary: #5C5A5B;
      --text-muted: #7A7879;
      --border: #E5E3E4;
      --bg: #F5F3F4;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Meiryo UI', 'Meiryo', 'BIZ UDPGothic', 'Hiragino Kaku Gothic ProN', sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      line-height: 1.8;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 2rem;
      color: var(--text);
      text-align: center;
    }

    .app-list {
      list-style: none;
    }

    .app-list li {
      margin-bottom: 0.5rem;
    }

    .app-list a {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: white;
      border-radius: 8px;
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      transition: border-color 0.2s;
    }

    .app-list a:hover {
      border-color: #C87B7A;
      box-shadow: 0 2px 8px rgba(200, 123, 122, 0.15);
    }

    .app-list .app-name {
      font-weight: 600;
      font-size: 1rem;
    }

    .app-list .app-desc {
      font-size: 0.85rem;
      color: var(--textMuted);
      margin-top: 0.25rem;
    }

    .app-list .app-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .app-list .app-info {
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ChiriProject　Apps</h1>
    <ul class="app-list">
      <li>
        <a href="yesno.html">
          <img src="./assets/yesno.jpeg" alt="YesNo Tonight" class="app-icon">
          <span class="app-info">
            <span class="app-name">YesNo Tonight</span>
            <span class="app-desc">今夜の気分をパートナーと共有しよう</span>
          </span>
        </a>
      </li>
      <li>
        <a href="golfbuddy.html">
          <img src="./assets/golfbuddy.png" alt="GolfBuddy" class="app-icon">
          <span class="app-info">
            <span class="app-name">GolfBuddy</span>
            <span class="app-desc">身内ゴルフの遊びルールを記録するアプリ</span>
          </span>
        </a>
      </li>
    </ul>
  </div>
</body>
</html>
